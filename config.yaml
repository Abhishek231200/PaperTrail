corpus:
  domain: "GLP-1 receptor agonists"
  query: >
    ("glucagon-like peptide-1 receptor agonist"[Title/Abstract] OR
     "GLP-1 receptor agonist"[Title/Abstract] OR
     semaglutide[Title/Abstract] OR tirzepatide[Title/Abstract] OR
     liraglutide[Title/Abstract]) AND 2019:2026[PDAT]
  target_size: 12000
  date_min: 2019
  date_max: 2026

embedding:
  provider: openai
  model: text-embedding-3-small
  dims: 1536

generation:
  provider: openai
  model: gpt-4o-mini

judge:
  provider: openai
  model: gpt-4o
  temperature: 0

retrieval:
  dense_top_k: 20
  lexical_top_k: 20
  rrf_k: 60
  rerank_top_k: 5
  reranker_model: BAAI/bge-reranker-base

chunking:
  strategy: sentence_window   # whole_abstract | sentence_window
  window_sentences: 3
  window_overlap: 1

eval:
  golden_set_path: src/evals/golden_set.jsonl
  seed: 42
  human_spotcheck_fraction: 0.2

seed: 42
